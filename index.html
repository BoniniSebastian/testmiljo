<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SB Soundboard V6</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bgEq" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="appShell">
    <header class="soundsBar glass">
      <div class="soundsBarHead">
        <div class="soundsBarTitle">SOUNDS</div>
        <button id="soundsRandomBtn" class="miniActionBtn" type="button">▶ Random (S)</button>
      </div>
      <div id="soundsList" class="soundsList">
        <div class="emptyState">Laddar sounds...</div>
      </div>
    </header>

    <main class="mainGrid">
      <section class="leftColumn">
        <section id="utvisningSection" class="librarySection glass sectionCompact">
          <div class="sectionHeader">
            <div class="sectionTitleWrap">
              <div class="sectionMiniTitle">utvisning</div>
              <div class="sectionTitle">UTVISNING</div>
            </div>
            <div class="sectionActions">
              <button id="utvisningRandomBtn" class="sectionActionBtn primary" type="button">▶ Random (U)</button>
            </div>
          </div>
          <div id="utvisningList" class="trackList">
            <div class="emptyState">Laddar utvisning...</div>
          </div>
        </section>

        <section id="malSection" class="librarySection glass sectionCompact">
          <div class="sectionHeader">
            <div class="sectionTitleWrap">
              <div class="sectionMiniTitle">mal</div>
              <div class="sectionTitle">MÅL</div>
            </div>
            <div class="sectionActions">
              <button id="malRandomBtn" class="sectionActionBtn primary" type="button">▶ Random (M)</button>
            </div>
          </div>
          <div id="malList" class="trackList">
            <div class="emptyState">Laddar mål...</div>
          </div>
        </section>
      </section>

      <section class="rightColumn">
        <section id="avbrottSection" class="librarySection glass sectionTall">
          <div class="sectionHeader">
            <div class="sectionTitleWrap">
              <div class="sectionMiniTitle">avbrott</div>
              <div class="sectionTitle">AVBROTT</div>
            </div>
            <div class="sectionActions">
              <button id="avbrottRandomBtn" class="sectionActionBtn primary" type="button">▶ Random (A)</button>
            </div>
          </div>
          <div id="avbrottList" class="trackList avbrottList">
            <div class="emptyState">Laddar avbrott...</div>
          </div>
        </section>
      </section>
    </main>

    <section class="bottomStage">
      <div class="goalDock glass">
        <button id="goalHornBtn" class="goalRound goalHornRound" type="button">
          <span class="goalRoundInner">
            <span class="goalRoundTitle">GOAL HORN</span>
            <span class="goalRoundMeta">Direkt tuta (G)</span>
          </span>
        </button>

        <div class="preloadDock glassInner">
          <button id="goalComboBtn" class="goalRound goalComboRound" type="button">
            <span class="goalRoundInner">
              <span class="goalRoundTitle">GOAL COMBO</span>
              <span class="goalRoundMeta">Tuta + förladdad låt (C)</span>
            </span>
          </button>

          <div class="preloadInline">
            <div class="tinyLabel">Förladdad låt</div>
            <div id="preloadTitle" class="preloadInlineTitle">Ingen låt laddad</div>
            <div class="preloadInlineMetaRow">
              <div id="preloadBadge" class="preloadBadge">Tom</div>
              <button id="clearPreloadBtn" class="miniActionBtn subtleBtn" type="button">Rensa</button>
            </div>
          </div>
        </div>
      </div>

      <section class="wheelStage">
        <button id="centerPlayPauseBtn" class="playerWheel" type="button" aria-label="Play eller pausa">
          <div class="playerWheelNeon"></div>
          <div class="playerWheelInner">
            <div class="wheelTopRow">
              <div class="tinyLabel">Spelas nu</div>
              <div id="playerStatePill" class="playerStatePill">Idle</div>
            </div>

            <div id="nowPlayingTitle" class="nowPlayingTitle">Ingen låt vald</div>

            <div class="wheelVisualizerWrap">
              <div id="visualizer" class="visualizer ambient">
                <span></span><span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span><span></span>
              </div>
            </div>

            <div id="circleTime" class="circleTime">--:--</div>
            <div id="circleMeta" class="circleMeta">Välj en låt</div>
            <div id="circleIcon" class="circleIcon">▶</div>
          </div>
        </button>

        <div class="wheelActions">
          <button id="resumeBtn" class="actionBtn glass" type="button">▶ Spela</button>
          <button id="pauseBtn" class="actionBtn glass" type="button">❚❚ Pausa</button>
          <button id="stopBtn" class="actionBtn glass dangerSoft" type="button">■ Stop</button>
          <button id="resetBtn" class="actionBtn glass" type="button">Nollställ</button>
        </div>
      </section>
    </section>

    <footer class="shortcutFooter glass">
      <span class="legendChip">G goal horn</span>
      <span class="legendChip">C combo</span>
      <span class="legendChip">A avbrott random</span>
      <span class="legendChip">U utvisning random</span>
      <span class="legendChip">M mål random</span>
      <span class="legendChip">S sounds random</span>
      <span class="legendChip">Space play/pause</span>
      <span class="legendChip">Esc stop</span>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
