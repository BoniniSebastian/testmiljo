<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SB Soundboard V8</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bgEq" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>

  <div class="appShell">
    <aside class="leftPanel">
      <div id="digitalClock" class="digitalClock">
      00:00
    </div>
      <div class="playerCard">
        <button id="centerPlayPauseBtn" class="playerWheel" type="button" aria-label="Play eller pausa">
          <div class="playerWheelNeon"></div>
          <div class="playerWheelInner">
            <div class="wheelTopLabel">SPELAS NU</div>
            <div id="nowPlayingTitle" class="nowPlayingTitle">Ingen låt vald</div>

            <div class="wheelVisualizerWrap">
              <div id="visualizer" class="visualizer ambient">
                <span></span><span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span><span></span>
              </div>
            </div>

            <div class="wheelTimeRow">
              <div id="circleTime" class="circleTime">--:--</div>
              <div id="playerStatePill" class="playerStatePill">Idle</div>
            </div>

            <div id="circleMeta" class="circleMeta">Välj en låt</div>
            <div id="circleIcon" class="circleIcon">▶</div>
          </div>
        </button>

        <div class="wheelActions">
          <button id="resumeBtn" class="actionBtn" type="button">▶ Spela</button>
          <button id="pauseBtn" class="actionBtn" type="button">❚❚ Pausa</button>
          <button id="stopBtn" class="actionBtn dangerSoft" type="button">■ Stop</button>
          <button id="resetBtn" class="actionBtn" type="button">Nollställ</button>
        </div>
      </div>

      <div class="preloadPanel">
        <div class="preloadTitle">PRELOAD</div>

        <div class="preloadButtons">
          <button id="goalHornBtn" class="goalBtn hornBtn" type="button">
            <span class="goalBtnLabel">GOAL HORN</span>
            <span class="goalBtnMeta">Direkt tuta (G)</span>
          </button>

          <button id="goalComboBtn" class="goalBtn comboBtn" type="button">
            <span class="goalBtnLabel">GOAL COMBO</span>
            <span class="goalBtnMeta">Tuta + preload (C)</span>
          </button>
        </div>

        <div class="preloadTrackCard">
          <div class="preloadTrackTop">
            <div class="preloadTrackLabel">Förladdad låt</div>
            <button id="clearPreloadBtn" class="tinyBtn" type="button">Rensa</button>
          </div>

          <div id="preloadTitleText" class="preloadTrackName">Ingen låt laddad</div>

          <div class="preloadStatusRow">
            <div id="preloadBadge" class="preloadBadge">Tom</div>
          </div>
          
          <div class="quickRandomRow">
  <button id="randomMalBtn" class="quickBtn">🎯 Mål</button>
  <button id="randomAvbrottBtn" class="quickBtn">⏸ Avbrott</button>
  <button id="randomUtvisningBtn" class="quickBtn">🚫 Utvisning</button>
</div>
        </div>
      </div>
    </aside>

    <main class="rightPanel">
      <div class="contentGrid">
        <section class="audioSection sectionGoal">
          <div class="sectionHeader">
            <div>
              <div class="sectionMiniTitle">mal</div>
              <div class="sectionTitle">MÅL</div>
            </div>
            <button id="malRandomBtn" class="sectionActionBtn" type="button">▶ Random (M)</button>
          </div>
          <div id="malList" class="trackList trackList4">
            <div class="emptyState">Laddar mål...</div>
          </div>
        </section>

        <section class="audioSection sectionPenalty">
          <div class="sectionHeader">
            <div>
              <div class="sectionMiniTitle">utvisning</div>
              <div class="sectionTitle">UTVISNING</div>
            </div>
            <button id="utvisningRandomBtn" class="sectionActionBtn" type="button">▶ Random (U)</button>
          </div>
          <div id="utvisningList" class="trackList trackList4">
            <div class="emptyState">Laddar utvisning...</div>
          </div>
        </section>

        <section class="audioSection sectionSounds">
          <div class="sectionHeader">
            <div>
              <div class="sectionMiniTitle">tuta</div>
              <div class="sectionTitle">SOUNDS</div>
            </div>
            <button id="soundsRandomBtn" class="sectionActionBtn" type="button">▶ Random (S)</button>
          </div>
          <div id="soundsList" class="trackList trackList4">
            <div class="emptyState">Laddar sounds...</div>
          </div>
        </section>

        <section class="audioSection sectionBreak">
          <div class="sectionHeader">
            <div>
              <div class="sectionMiniTitle">avbrott</div>
              <div class="sectionTitle">AVBROTT</div>
            </div>
            <button id="avbrottRandomBtn" class="sectionActionBtn" type="button">▶ Random (A)</button>
          </div>
          <div id="avbrottList" class="trackList trackList4 tallList">
            <div class="emptyState">Laddar avbrott...</div>
          </div>
        </section>
      </div>
    </main>

    <footer class="shortcutFooter">
      <span class="legendChip">G goal horn</span>
      <span class="legendChip">C combo</span>
      <span class="legendChip">A avbrott random</span>
      <span class="legendChip">U utvisning random</span>
      <span class="legendChip">M mål random</span>
      <span class="legendChip">S sounds random</span>
      <span class="legendChip">Space play/pause</span>
      <span class="legendChip">Esc stop</span>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
