<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SB Edge Light</title>
  <style>
    :root{
      --bg:#000000;
      --frame-top:72px;
      --frame-side:96px;
      --frame-bottom:44px;
      --frame-opacity:0.92;
      --frame-blur:34px;
      --frame-color-rgb:255,255,255;
      --frame-inner-line:rgba(255,255,255,.32);

      --ambient-a:#58a6ff;
      --ambient-b:#a970ff;
      --ambient-c:#00d1b2;
      --ambient-strength:.65;
      --ambient-speed:16s;
      --ambient-blur:120px;
      --ambient-scale:1;

      --timer-minutes:25;
      --timer-progress:0;
      --timer-rgb:255,255,255;
      --timer-glow:.9;

      --panel-bg:rgba(10,10,12,.58);
      --panel-border:rgba(255,255,255,.08);
      --text:#ffffff;
      --muted:rgba(255,255,255,.68);
      --chip:rgba(255,255,255,.08);
      --chip-active:rgba(255,255,255,.16);
      --shadow:0 16px 50px rgba(0,0,0,.34);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      overflow:hidden;
      background:var(--bg);
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    .app{
      position:relative;
      width:100vw;
      height:100vh;
      background:var(--bg);
      isolation:isolate;
    }

    .ambientLayer{
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:0;
      transition:opacity .35s ease;
      z-index:0;
    }
    .app.mode-ambient .ambientLayer{opacity:1}

    .blob{
      position:absolute;
      border-radius:999px;
      filter:blur(var(--ambient-blur));
      opacity:var(--ambient-strength);
      mix-blend-mode:screen;
      transform:translateZ(0) scale(var(--ambient-scale));
      animation:floatBlob var(--ambient-speed) ease-in-out infinite alternate;
    }
    .blob.a{
      width:min(46vw,900px);
      height:min(46vw,900px);
      left:-8vw;
      top:-10vh;
      background:radial-gradient(circle at 50% 50%, rgba(88,166,255,.95), rgba(88,166,255,.22) 45%, transparent 72%);
      animation-duration:calc(var(--ambient-speed) * 1.0);
    }
    .blob.b{
      width:min(44vw,840px);
      height:min(44vw,840px);
      right:-6vw;
      top:12vh;
      background:radial-gradient(circle at 50% 50%, rgba(169,112,255,.85), rgba(169,112,255,.20) 42%, transparent 72%);
      animation-duration:calc(var(--ambient-speed) * 1.18);
      animation-delay:-4s;
    }
    .blob.c{
      width:min(40vw,760px);
      height:min(40vw,760px);
      left:20vw;
      bottom:-18vh;
      background:radial-gradient(circle at 50% 50%, rgba(0,209,178,.78), rgba(0,209,178,.16) 40%, transparent 70%);
      animation-duration:calc(var(--ambient-speed) * 1.35);
      animation-delay:-9s;
    }
    .vignette{
      position:absolute;
      inset:0;
      background:radial-gradient(circle at center, transparent 24%, rgba(0,0,0,.10) 52%, rgba(0,0,0,.34) 100%);
    }

    .frame{
      position:absolute;
      inset:0;
      z-index:1;
      pointer-events:none;
    }
    .edge{
      position:absolute;
      background:rgba(var(--frame-color-rgb), var(--frame-opacity));
      box-shadow:0 0 calc(var(--frame-blur) * 1.1) rgba(var(--frame-color-rgb), .38);
    }
    .edge::after{
      content:"";
      position:absolute;
      inset:0;
      border:1px solid transparent;
      opacity:.7;
    }
    .edge.top{
      top:0; left:0; right:0; height:var(--frame-top);
      background:linear-gradient(to bottom,
        rgba(var(--frame-color-rgb), calc(var(--frame-opacity) * 1.00)) 0%,
        rgba(var(--frame-color-rgb), calc(var(--frame-opacity) * .52)) 45%,
        rgba(var(--frame-color-rgb), 0) 100%);
    }
    .edge.bottom{
      bottom:0; left:0; right:0; height:var(--frame-bottom);
      background:linear-gradient(to top,
        rgba(var(--frame-color-rgb), calc(var(--frame-opacity) * .82)) 0%,
        rgba(var(--frame-color-rgb), calc(var(--frame-opacity) * .40)) 45%,
        rgba(var(--frame-color-rgb), 0) 100%);
    }
    .edge.left{
      left:0; top:0; bottom:0; width:var(--frame-side);
      background:linear-gradient(to right,
        rgba(var(--frame-color-rgb), calc(var(--frame-opacity) * .96)) 0%,
        rgba(var(--frame-color-rgb), calc(var(--frame-opacity) * .48)) 42%,
        rgba(var(--frame-color-rgb), 0) 100%);
    }
    .edge.right{
      right:0; top:0; bottom:0; width:var(--frame-side);
      background:linear-gradient(to left,
        rgba(var(--frame-color-rgb), calc(var(--frame-opacity) * .96)) 0%,
        rgba(var(--frame-color-rgb), calc(var(--frame-opacity) * .48)) 42%,
        rgba(var(--frame-color-rgb), 0) 100%);
    }

    .timerPath{
      position:absolute;
      top:var(--frame-top);
      left:var(--frame-side);
      right:var(--frame-side);
      bottom:var(--frame-bottom);
      border-radius:34px;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);
      overflow:hidden;
      opacity:.95;
    }
    .timerPath::before{
      content:"";
      position:absolute;
      inset:-1px;
      border-radius:inherit;
      padding:2px;
      background:conic-gradient(
        from -90deg,
        rgba(var(--timer-rgb), calc(.10 + var(--timer-glow) * .12)) 0turn,
        rgba(var(--timer-rgb), calc(.10 + var(--timer-glow) * .12)) calc(1turn * (1 - var(--timer-progress))),
        rgba(var(--timer-rgb), calc(.96 * var(--timer-glow))) calc(1turn * (1 - var(--timer-progress))),
        rgba(var(--timer-rgb), calc(.96 * var(--timer-glow))) 1turn
      );
      -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite:xor;
      mask-composite:exclude;
      filter:drop-shadow(0 0 10px rgba(var(--timer-rgb), .35));
    }
    .timerPath.off::before{opacity:.18}

    .hud{
      position:absolute;
      top:18px;
      left:18px;
      right:18px;
      z-index:5;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      pointer-events:none;
    }

    .panel{
      pointer-events:auto;
      background:var(--panel-bg);
      border:1px solid var(--panel-border);
      border-radius:22px;
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      box-shadow:var(--shadow);
    }

    .titlePanel{
      padding:14px 16px;
      min-width:250px;
    }
    .eyebrow{font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted)}
    .title{font-size:22px; font-weight:800; line-height:1; margin-top:5px}
    .subtitle{margin-top:7px; color:var(--muted); font-size:13px}

    .controls{
      width:min(420px, calc(100vw - 36px));
      padding:14px;
    }
    .row{display:flex; gap:8px; flex-wrap:wrap}
    .row + .row{margin-top:12px}

    .seg{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .chip{
      border:1px solid rgba(255,255,255,.08);
      background:var(--chip);
      color:#fff;
      padding:10px 12px;
      border-radius:14px;
      font-size:13px;
      font-weight:700;
      cursor:pointer;
      transition:transform .15s ease, background .15s ease, border-color .15s ease;
    }
    .chip:hover{transform:translateY(-1px)}
    .chip.active{background:var(--chip-active); border-color:rgba(255,255,255,.18)}

    .field{
      display:grid;
      grid-template-columns:110px 1fr 44px;
      align-items:center;
      gap:10px;
      width:100%;
    }
    .field label{font-size:13px; color:var(--muted); font-weight:700}
    .value{font-size:12px; color:#fff; text-align:right; font-variant-numeric:tabular-nums}

    input[type="range"]{
      width:100%;
      appearance:none;
      -webkit-appearance:none;
      height:6px;
      background:rgba(255,255,255,.12);
      border-radius:999px;
      outline:none;
    }
    input[type="range"]::-webkit-slider-thumb{
      -webkit-appearance:none;
      width:18px;
      height:18px;
      border-radius:50%;
      background:#fff;
      box-shadow:0 0 0 4px rgba(255,255,255,.12);
      cursor:pointer;
    }
    input[type="color"]{
      width:42px;
      height:34px;
      border:none;
      background:transparent;
      padding:0;
      cursor:pointer;
    }

    .timerBar{
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:8px;
      width:100%;
    }
    .timerBtn, .smallBtn{
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.08);
      color:#fff;
      border-radius:14px;
      padding:10px 12px;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
    }
    .timerBtn.active{background:rgba(255,255,255,.18)}
    .smallBtn{padding:10px 14px}

    .statusPill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      border-radius:999px;
      padding:8px 12px;
      font-size:12px;
      font-weight:800;
    }
    .dot{
      width:8px; height:8px; border-radius:50%; background:#9cffd0;
      box-shadow:0 0 12px rgba(156,255,208,.6);
    }

    .timerReadout{
      position:absolute;
      left:50%;
      bottom:24px;
      transform:translateX(-50%);
      z-index:4;
      min-width:230px;
      padding:14px 16px;
      text-align:center;
      pointer-events:auto;
    }
    .timerLabel{font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted)}
    .timerValue{font-size:42px; line-height:1; font-weight:900; font-variant-numeric:tabular-nums; margin-top:6px}
    .timerSub{font-size:13px; color:var(--muted); margin-top:6px}

    .hidden{display:none !important}

    @keyframes floatBlob{
      0%{transform:translate3d(0,0,0) scale(calc(var(--ambient-scale) * 0.96))}
      50%{transform:translate3d(1.6vw,-1.8vh,0) scale(calc(var(--ambient-scale) * 1.04))}
      100%{transform:translate3d(-1.2vw,2.2vh,0) scale(calc(var(--ambient-scale) * 0.99))}
    }

    @media (max-width: 980px){
      .hud{flex-direction:column; align-items:stretch}
      .titlePanel,.controls{width:100%}
      .field{grid-template-columns:95px 1fr 40px}
      .timerBar{grid-template-columns:repeat(3,minmax(0,1fr))}
    }
  </style>
</head>
<body>
  <div class="app mode-ultrawide" id="appRoot">
    <div class="ambientLayer" aria-hidden="true">
      <div class="blob a"></div>
      <div class="blob b"></div>
      <div class="blob c"></div>
      <div class="vignette"></div>
    </div>

    <div class="frame" aria-hidden="true">
      <div class="edge top"></div>
      <div class="edge right"></div>
      <div class="edge bottom"></div>
      <div class="edge left"></div>
      <div class="timerPath off" id="timerPath"></div>
    </div>

    <div class="hud">
      <div class="panel titlePanel">
        <div class="eyebrow">SB Edge Light</div>
        <div class="title" id="titleMode">Ultrawide</div>
        <div class="subtitle" id="subtitleMode">Bred ljusram för 3440×1440 och två fönster sida vid sida.</div>
      </div>

      <div class="panel controls">
        <div class="row">
          <div class="seg" id="modeSeg">
            <button class="chip active" data-mode="ultrawide">Ultrawide</button>
            <button class="chip" data-mode="standard">Standard</button>
            <button class="chip" data-mode="ambient">Ambient</button>
          </div>
        </div>

        <div class="row hidden" id="ambientThemesRow">
          <div class="seg" id="themeSeg">
            <button class="chip active" data-theme="aurora">Aurora</button>
            <button class="chip" data-theme="ember">Ember</button>
            <button class="chip" data-theme="ocean">Ocean</button>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="brightnessRange">Ljusstyrka</label>
            <input id="brightnessRange" type="range" min="20" max="100" value="92" />
            <div class="value" id="brightnessValue">92</div>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="sideRange">Sidor</label>
            <input id="sideRange" type="range" min="24" max="180" value="96" />
            <div class="value" id="sideValue">96</div>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="topRange">Topp</label>
            <input id="topRange" type="range" min="18" max="180" value="72" />
            <div class="value" id="topValue">72</div>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="bottomRange">Botten</label>
            <input id="bottomRange" type="range" min="0" max="140" value="44" />
            <div class="value" id="bottomValue">44</div>
          </div>
        </div>

        <div class="row" id="ambientSpeedRow" style="display:none">
          <div class="field">
            <label for="ambientSpeedRange">Blob</label>
            <input id="ambientSpeedRange" type="range" min="8" max="36" value="16" />
            <div class="value" id="ambientSpeedValue">16</div>
          </div>
        </div>

        <div class="row" id="ambientStrengthRow" style="display:none">
          <div class="field">
            <label for="ambientStrengthRange">Glow</label>
            <input id="ambientStrengthRange" type="range" min="15" max="100" value="65" />
            <div class="value" id="ambientStrengthValue">65</div>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="colorPicker">Färg</label>
            <input id="colorPicker" type="color" value="#ffffff" />
            <div class="value" id="colorValue">#ffffff</div>
          </div>
        </div>

        <div class="row">
          <div class="statusPill"><span class="dot"></span><span id="statusText">Timer av</span></div>
        </div>

        <div class="row">
          <div class="timerBar" id="timerPresets">
            <button class="timerBtn" data-minutes="5">5 min</button>
            <button class="timerBtn" data-minutes="15">15</button>
            <button class="timerBtn active" data-minutes="25">25</button>
            <button class="timerBtn" data-minutes="45">45</button>
            <button class="timerBtn" data-minutes="60">60</button>
          </div>
        </div>

        <div class="row">
          <div class="seg">
            <button class="smallBtn" id="timerStartPause">Start</button>
            <button class="smallBtn" id="timerReset">Reset</button>
            <button class="smallBtn" id="fullscreenBtn">F11-läge</button>
          </div>
        </div>
      </div>
    </div>

    <div class="panel timerReadout" id="timerReadout">
      <div class="timerLabel">Focus timer</div>
      <div class="timerValue" id="timerValue">25:00</div>
      <div class="timerSub" id="timerSub">Timebar följer insidan av ramen.</div>
    </div>
  </div>

  <script>
    (() => {
      const root = document.documentElement;
      const appRoot = document.getElementById('appRoot');
      const titleMode = document.getElementById('titleMode');
      const subtitleMode = document.getElementById('subtitleMode');
      const timerPath = document.getElementById('timerPath');
      const statusText = document.getElementById('statusText');
      const timerValue = document.getElementById('timerValue');
      const timerSub = document.getElementById('timerSub');
      const modeButtons = [...document.querySelectorAll('#modeSeg .chip')];
      const themeButtons = [...document.querySelectorAll('#themeSeg .chip')];
      const timerButtons = [...document.querySelectorAll('#timerPresets .timerBtn')];

      const brightnessRange = document.getElementById('brightnessRange');
      const sideRange = document.getElementById('sideRange');
      const topRange = document.getElementById('topRange');
      const bottomRange = document.getElementById('bottomRange');
      const ambientSpeedRange = document.getElementById('ambientSpeedRange');
      const ambientStrengthRange = document.getElementById('ambientStrengthRange');
      const colorPicker = document.getElementById('colorPicker');

      const brightnessValue = document.getElementById('brightnessValue');
      const sideValue = document.getElementById('sideValue');
      const topValue = document.getElementById('topValue');
      const bottomValue = document.getElementById('bottomValue');
      const ambientSpeedValue = document.getElementById('ambientSpeedValue');
      const ambientStrengthValue = document.getElementById('ambientStrengthValue');
      const colorValue = document.getElementById('colorValue');

      const ambientThemesRow = document.getElementById('ambientThemesRow');
      const ambientSpeedRow = document.getElementById('ambientSpeedRow');
      const ambientStrengthRow = document.getElementById('ambientStrengthRow');
      const timerStartPause = document.getElementById('timerStartPause');
      const timerReset = document.getElementById('timerReset');
      const fullscreenBtn = document.getElementById('fullscreenBtn');

      const presets = {
        ultrawide: {
          label: 'Ultrawide',
          subtitle: 'Bred ljusram för 3440×1440 och två fönster sida vid sida.',
          brightness: 92,
          top: 72,
          side: 96,
          bottom: 44,
          color: '#ffffff'
        },
        standard: {
          label: 'Standard',
          subtitle: 'Jämnare ljusram för 1920×1200 och klassisk arbetsyta.',
          brightness: 88,
          top: 68,
          side: 78,
          bottom: 40,
          color: '#fff9f0'
        },
        ambient: {
          label: 'Ambient',
          subtitle: 'Helskärmsläge med breathing blob, färgtema och mjuk glow.',
          brightness: 56,
          top: 26,
          side: 26,
          bottom: 22,
          color: '#d9e7ff',
          ambientSpeed: 16,
          ambientStrength: 65,
          theme: 'aurora'
        }
      };

      const ambientThemes = {
        aurora: {
          a: '#58a6ff',
          b: '#a970ff',
          c: '#00d1b2',
          bg: '#02040a'
        },
        ember: {
          a: '#ff9559',
          b: '#ff5e78',
          c: '#ffd166',
          bg: '#090403'
        },
        ocean: {
          a: '#00c2ff',
          b: '#1167ff',
          c: '#00ffc6',
          bg: '#01060a'
        }
      };

      const state = {
        mode: 'ultrawide',
        theme: 'aurora',
        timerMinutes: 25,
        totalSeconds: 25 * 60,
        remainingSeconds: 25 * 60,
        running: false,
        tickHandle: null
      };

      function hexToRgb(hex){
        const clean = hex.replace('#','');
        const full = clean.length === 3 ? clean.split('').map(c => c + c).join('') : clean;
        const int = parseInt(full,16);
        return `${(int >> 16) & 255},${(int >> 8) & 255},${int & 255}`;
      }

      function setVar(name, value){
        root.style.setProperty(name, value);
      }

      function formatTime(sec){
        const mins = Math.floor(sec / 60);
        const secs = sec % 60;
        return `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
      }

      function updateReadout(){
        timerValue.textContent = formatTime(state.remainingSeconds);
        const progress = 1 - (state.remainingSeconds / state.totalSeconds || 0);
        setVar('--timer-progress', progress.toFixed(5));
        timerPath.classList.toggle('off', !state.running && progress === 0);
        if(state.running){
          statusText.textContent = `Timer på • ${state.timerMinutes} min`;
          timerSub.textContent = 'Timebar går runt ramens insida medan timern räknar ned.';
        }else if(state.remainingSeconds === state.totalSeconds){
          statusText.textContent = 'Timer av';
          timerSub.textContent = 'Timebar följer insidan av ramen.';
        }else if(state.remainingSeconds === 0){
          statusText.textContent = 'Klar';
          timerSub.textContent = 'Tiden är ute.';
        }else{
          statusText.textContent = 'Pausad';
          timerSub.textContent = 'Timebar står kvar där du pausade.';
        }
      }

      function stopTimer(){
        state.running = false;
        if(state.tickHandle) clearInterval(state.tickHandle);
        state.tickHandle = null;
        timerStartPause.textContent = 'Start';
        updateReadout();
      }

      function startTimer(){
        if(state.remainingSeconds <= 0){
          state.remainingSeconds = state.totalSeconds;
        }
        if(state.tickHandle) clearInterval(state.tickHandle);
        state.running = true;
        timerStartPause.textContent = 'Pausa';
        updateReadout();
        state.tickHandle = setInterval(() => {
          if(state.remainingSeconds > 0){
            state.remainingSeconds -= 1;
            updateReadout();
          }
          if(state.remainingSeconds <= 0){
            stopTimer();
            try{ navigator.vibrate?.([200,120,240]); } catch {}
          }
        }, 1000);
      }

      function resetTimer(){
        stopTimer();
        state.totalSeconds = state.timerMinutes * 60;
        state.remainingSeconds = state.totalSeconds;
        updateReadout();
      }

      function applyAmbientTheme(themeKey){
        const t = ambientThemes[themeKey];
        if(!t) return;
        state.theme = themeKey;
        setVar('--ambient-a', t.a);
        setVar('--ambient-b', t.b);
        setVar('--ambient-c', t.c);
        setVar('--bg', t.bg);
        document.querySelector('.blob.a').style.background = `radial-gradient(circle at 50% 50%, ${t.a}, color-mix(in srgb, ${t.a} 28%, transparent) 45%, transparent 72%)`;
        document.querySelector('.blob.b').style.background = `radial-gradient(circle at 50% 50%, ${t.b}, color-mix(in srgb, ${t.b} 24%, transparent) 42%, transparent 72%)`;
        document.querySelector('.blob.c').style.background = `radial-gradient(circle at 50% 50%, ${t.c}, color-mix(in srgb, ${t.c} 20%, transparent) 40%, transparent 70%)`;
        themeButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.theme === themeKey));
      }

      function applyControlsToCss(){
        brightnessValue.textContent = brightnessRange.value;
        sideValue.textContent = sideRange.value;
        topValue.textContent = topRange.value;
        bottomValue.textContent = bottomRange.value;
        ambientSpeedValue.textContent = ambientSpeedRange.value;
        ambientStrengthValue.textContent = ambientStrengthRange.value;
        colorValue.textContent = colorPicker.value;

        setVar('--frame-opacity', (Number(brightnessRange.value) / 100).toFixed(2));
        setVar('--frame-top', `${topRange.value}px`);
        setVar('--frame-side', `${sideRange.value}px`);
        setVar('--frame-bottom', `${bottomRange.value}px`);
        setVar('--frame-color-rgb', hexToRgb(colorPicker.value));
        setVar('--timer-rgb', hexToRgb(colorPicker.value));
        setVar('--ambient-speed', `${ambientSpeedRange.value}s`);
        setVar('--ambient-strength', (Number(ambientStrengthRange.value) / 100).toFixed(2));
      }

      function applyPreset(modeKey){
        const p = presets[modeKey];
        if(!p) return;
        state.mode = modeKey;
        appRoot.classList.remove('mode-ultrawide','mode-standard','mode-ambient');
        appRoot.classList.add(`mode-${modeKey}`);

        titleMode.textContent = p.label;
        subtitleMode.textContent = p.subtitle;

        brightnessRange.value = p.brightness;
        topRange.value = p.top;
        sideRange.value = p.side;
        bottomRange.value = p.bottom;
        colorPicker.value = p.color;

        if(modeKey === 'ambient'){
          ambientThemesRow.classList.remove('hidden');
          ambientSpeedRow.style.display = '';
          ambientStrengthRow.style.display = '';
          ambientSpeedRange.value = p.ambientSpeed;
          ambientStrengthRange.value = p.ambientStrength;
          applyAmbientTheme(p.theme || 'aurora');
        }else{
          ambientThemesRow.classList.add('hidden');
          ambientSpeedRow.style.display = 'none';
          ambientStrengthRow.style.display = 'none';
          setVar('--bg', '#000000');
        }

        modeButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.mode === modeKey));
        applyControlsToCss();
      }

      modeButtons.forEach(btn => {
        btn.addEventListener('click', () => applyPreset(btn.dataset.mode));
      });

      themeButtons.forEach(btn => {
        btn.addEventListener('click', () => applyAmbientTheme(btn.dataset.theme));
      });

      [brightnessRange, sideRange, topRange, bottomRange, ambientSpeedRange, ambientStrengthRange, colorPicker].forEach(input => {
        input.addEventListener('input', applyControlsToCss);
      });

      timerButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          timerButtons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          state.timerMinutes = Number(btn.dataset.minutes);
          state.totalSeconds = state.timerMinutes * 60;
          state.remainingSeconds = state.totalSeconds;
          stopTimer();
          updateReadout();
        });
      });

      timerStartPause.addEventListener('click', () => {
        if(state.running) stopTimer();
        else startTimer();
      });

      timerReset.addEventListener('click', resetTimer);

      fullscreenBtn.addEventListener('click', async () => {
        try{
          if(!document.fullscreenElement) await document.documentElement.requestFullscreen();
          else await document.exitFullscreen();
        }catch{}
      });

      document.addEventListener('keydown', (e) => {
        if(e.key.toLowerCase() === 'f') {
          e.preventDefault();
          fullscreenBtn.click();
        }
        if(e.code === 'Space' && !(e.target instanceof HTMLInputElement)) {
          e.preventDefault();
          timerStartPause.click();
        }
      });

      applyPreset('ultrawide');
      resetTimer();
    })();
  </script>
</body>
</html>
